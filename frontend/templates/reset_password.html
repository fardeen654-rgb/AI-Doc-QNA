{% block content %}

    <h5 class="mb-3">Reset Password</h5>

        <input type="password" name="password" class="form-control mb-3" required placeholder="New password">
        <button class="btn btn-success w-100">Reset Password</button>
    </form>
</div>
{% endblock %}
